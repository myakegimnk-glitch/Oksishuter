name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Stage frontend (exclude backend & ci)
        run: |
          mkdir _site
          rsync -a \
            --exclude='backend/' \
            --exclude='.github/' \
            --exclude='.git/' \
            --exclude='_site/' \
            --exclude='README.md' \
            ./ _site/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
